<!DOCTYPE html>
<html lang="id">
<head>

    <title>Biodata Diri - Profil</title>

                    </tr>
                    <tr>

                    </tr>
                    <tr>
                        <td class="label">Alamat</td>

                    </tr>
                    <tr>
                        <td class="label">Pekerjaan</td>
                        <td class="value">: UI/UX Designer</td>
                    </tr>
                    <tr>
                        <td class="label">Email</td>
                        <td class="value">: halo@emailanda.com</td>
                    </tr>
                    <tr>
                        <td class="label">Hobi</td>
                        <td class="value">: Fotografi, Berenang</td>
                    </tr>
                </table>
            </div>
        </div>
    </div>

</body>
</html>
